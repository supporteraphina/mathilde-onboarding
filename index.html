<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#2A1230">
<title>Mikaela · Halevora &amp; Co.</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="32" fill="%232A1230"/><text x="32" y="43" font-family="Georgia,serif" font-style="italic" font-size="34" fill="%23F6CBDF" text-anchor="middle">M</text></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --plum:#2A1230;
  --plum-deep:#1F0C24;
  --plum-shade:#341539;
  --ivory:#FBF3F8;
  --ivory-soft:#FDF6FA;
  --mauve:#E9C7DC;
  --ink:#2A1230;
  --ink-2:#43213F;
  --orchid:#F0A6CC;
  --rose:#F6CBDF;
  --line:rgba(251,243,248,.32);
  --line-soft:rgba(251,243,248,.15);
  --danger:#FFD6E4;
  --danger-border:#C2417B;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--plum);
  color:var(--ivory);
  font-family:'Manrope',system-ui,-apple-system,sans-serif;
  font-size:16px;line-height:1.55;
  min-height:100svh;
  background-image:
    radial-gradient(1000px 540px at 50% -8%, rgba(240,166,204,.20), transparent 62%),
    radial-gradient(900px 500px at 50% 108%, rgba(20,6,26,.34), transparent 65%);
}
::selection{background:rgba(240,166,204,.42)}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  background:rgba(31,12,36,.84);
  border-bottom:1px solid var(--line-soft);
}
.header-inner{
  max-width:720px;margin:0 auto;padding:14px 20px;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;
}
.wordmark{
  font-family:'Fraunces',serif;font-weight:500;font-size:16px;letter-spacing:.15em;
  color:var(--ivory);text-transform:uppercase;white-space:nowrap;
}
.wordmark span{color:var(--orchid)}
.step-label{
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mauve);
  white-space:nowrap;font-weight:600;
}
.progress{height:2px;background:rgba(0,0,0,.22)}
.progress-fill{height:100%;width:100%;transform:scaleX(0);transform-origin:0 50%;background:linear-gradient(90deg,var(--orchid),var(--ivory));transition:transform .45s cubic-bezier(.22,1,.36,1)}

/* ---------- layout ---------- */
main{max-width:720px;margin:0 auto;padding:36px 20px 110px}
.screen{display:none}
.screen.active{display:block}
html.motion .screen.active{animation:rise .55s cubic-bezier(.22,1,.36,1) both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.eyebrow{
  display:flex;align-items:center;gap:14px;margin-bottom:16px;
}
.eyebrow .roman{
  font-family:'Fraunces',serif;font-style:italic;font-size:16px;color:var(--orchid);letter-spacing:.14em;font-weight:500;
}
.eyebrow .rule{flex:1;height:1px;background:var(--line-soft)}
.eyebrow .tag{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mauve);font-weight:600}

h1,h2{font-family:'Fraunces',serif;font-weight:500;line-height:1.12;letter-spacing:.005em;text-wrap:balance}
h1{font-size:clamp(34px,8.5vw,54px);margin-bottom:16px}
h1 em{font-style:italic;font-weight:400}
h2{font-size:clamp(26px,6vw,34px);margin-bottom:8px}
.lede{color:var(--mauve);font-size:15.5px;max-width:54ch;margin-bottom:6px;text-wrap:pretty}
.section-intro{color:var(--mauve);font-size:14.5px;margin-bottom:26px;max-width:56ch;text-wrap:pretty}

/* ---------- fields ---------- */
.field{margin-bottom:24px}
html.motion .field{animation:rise .5s cubic-bezier(.22,1,.36,1) both}
html.motion .field:nth-child(2){animation-delay:.03s}html.motion .field:nth-child(3){animation-delay:.06s}
html.motion .field:nth-child(4){animation-delay:.09s}html.motion .field:nth-child(5){animation-delay:.12s}
label.q{
  display:block;font-weight:600;font-size:15.5px;color:var(--ivory);margin-bottom:4px;
}
label.q .req{color:var(--orchid);margin-left:2px}
.hint{font-size:13px;color:var(--mauve);margin-bottom:9px}
input[type=text],textarea{
  width:100%;
  background:var(--ivory-soft);
  border:1px solid transparent;
  border-radius:var(--radius);
  color:var(--ink);
  font:inherit;font-size:16px;
  padding:13px 16px;
  transition:box-shadow .2s, background .2s, border-color .2s;
  -webkit-appearance:none;appearance:none;
}
textarea{min-height:96px;resize:vertical}
textarea.tall{min-height:190px}
input:focus,textarea:focus{
  outline:none;background:#fff;
  border-color:var(--ink);
  box-shadow:0 0 0 3px rgba(42,18,48,.18);
}
input::placeholder,textarea::placeholder{color:#8A6B82}
.field.invalid input{border-color:var(--danger-border);box-shadow:0 0 0 3px rgba(194,65,123,.20)}
.err{display:none;font-size:12.5px;font-weight:600;color:var(--danger);margin-top:6px}
.field.invalid .err{display:block}
/* conditional follow-up (revealed by a chip choice) */
.field.is-hidden{display:none}
.field[data-showif-id]{border-left:2px solid var(--line);padding-left:16px;margin-left:2px}
html.motion .field[data-showif-id]:not(.is-hidden){animation:rise .4s cubic-bezier(.22,1,.36,1) both}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{
  border:1px solid var(--line);
  background:transparent;
  color:var(--ivory);
  border-radius:999px;
  padding:9px 17px;
  font-size:14.5px;font-weight:500;font-family:inherit;
  cursor:pointer;
  transition:all .18s ease;
  -webkit-tap-highlight-color:transparent;
}
.chip:hover{border-color:var(--orchid);transform:translateY(-1px)}
.chip.on{
  background:var(--ivory);
  border-color:var(--ivory);
  color:var(--ink);
  font-weight:600;
}
.chip:focus-visible{outline:2px solid var(--orchid);outline-offset:2px}

/* ---------- nav ---------- */
.nav{
  display:flex;gap:12px;margin-top:36px;align-items:center;
}
.btn{
  font:inherit;font-weight:700;font-size:15px;letter-spacing:.02em;
  border-radius:999px;padding:15px 32px;cursor:pointer;
  transition:all .2s ease;border:1px solid transparent;
  -webkit-tap-highlight-color:transparent;
}
.btn-main{
  background:var(--ivory);
  color:var(--ink);flex:1;max-width:260px;
  box-shadow:0 10px 30px -12px rgba(15,4,20,.6);
}
.btn-main:hover{background:#fff;transform:translateY(-1px);box-shadow:0 14px 34px -12px rgba(15,4,20,.66)}
.btn-main:active{transform:none}
.btn-ghost{
  background:transparent;color:var(--mauve);border-color:var(--line);
}
.btn-ghost:hover{border-color:var(--orchid);color:var(--ivory)}
.btn:disabled{opacity:.6;cursor:wait;transform:none}
.btn:focus-visible{outline:2px solid var(--orchid);outline-offset:3px}

.skip-note{font-size:12.5px;color:var(--mauve);opacity:.85;margin-top:14px}

/* ---------- welcome ---------- */
.welcome{text-align:center}
html.motion .welcome > *{animation:rise .6s cubic-bezier(.22,1,.36,1) both}
html.motion .welcome > :nth-child(1){animation-delay:.05s}
html.motion .welcome > :nth-child(2){animation-delay:.16s}
html.motion .welcome > :nth-child(3){animation-delay:.24s}
html.motion .welcome > :nth-child(4){animation-delay:.32s}
html.motion .welcome > :nth-child(5){animation-delay:.40s}
html.motion .welcome > :nth-child(6){animation-delay:.48s}

.portrait-wrap{
  width:min(72vw,300px);
  margin:6px auto 30px;
  padding:10px;
  border:1px solid var(--line);
  border-radius:999px 999px 20px 20px;
  position:relative;
}
.portrait-wrap::before{
  content:"";position:absolute;inset:-40px -60px;z-index:-1;
  background:radial-gradient(closest-side, rgba(240,166,204,.24), transparent 75%);
}
.portrait-wrap img{
  display:block;width:100%;aspect-ratio:4/5;object-fit:cover;
  border-radius:989px 989px 12px 12px;
  filter:saturate(1.02);
  box-shadow:0 30px 70px -24px rgba(15,4,20,.62);
}
.portrait-fallback{display:none}
.portrait-wrap.missing img{display:none}
.portrait-wrap.missing .portrait-fallback{
  display:flex;align-items:center;justify-content:center;
  width:100%;aspect-ratio:4/5;
  border-radius:989px 989px 12px 12px;
  background:linear-gradient(170deg, var(--plum-shade), var(--plum-deep));
  font-family:'Fraunces',serif;font-style:italic;font-size:64px;color:var(--orchid);
}
.dedication{
  font-family:'Fraunces',serif;font-style:italic;font-size:15px;color:var(--orchid);
  letter-spacing:.04em;margin-bottom:10px;
}
.welcome .lede{margin:0 auto 6px}
.welcome .nav{justify-content:center}

.confidential{
  margin-top:32px;border:1px solid var(--line-soft);border-radius:var(--radius);
  padding:18px 20px;background:rgba(0,0,0,.14);
  font-size:13.5px;color:var(--mauve);text-align:left;
}
.confidential b{
  color:var(--orchid);font-weight:500;font-style:italic;font-size:15px;
  font-family:'Fraunces',serif;display:block;margin-bottom:5px;letter-spacing:.03em;
}
.toc{margin-top:36px;border-top:1px solid var(--line-soft);text-align:left}
.toc-row{
  display:flex;align-items:baseline;gap:16px;padding:12px 2px;
  border-bottom:1px solid var(--line-soft);font-size:14px;color:var(--mauve);
}
.toc-row .r{font-family:'Fraunces',serif;font-style:italic;color:var(--orchid);width:34px;font-size:14px;letter-spacing:.08em}

/* ---------- done ---------- */
.done-wrap{text-align:center;padding-top:8vh}
html.motion .done-wrap{animation:pop .6s cubic-bezier(.16,1,.3,1) both}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.done-crest{width:72px;height:72px;border:1px solid var(--line);border-radius:50%;margin:0 auto 28px;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--orchid)}

footer{
  text-align:center;padding:0 20px 40px;font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;color:rgba(233,199,220,.55);
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
@media (max-width:480px){
  .btn-main{max-width:none}
  .nav{flex-direction:column-reverse}
  .nav .btn{width:100%}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="wordmark">Halevora <span>&amp;</span> Co.</div>
    <div class="step-label" id="stepLabel">For Mikaela</div>
  </div>
  <div class="progress"><div class="progress-fill" id="bar"></div></div>
</header>

<main id="app"></main>

<footer>Made for Mikaela Testa · Halevora &amp; Co. · Confidential</footer>

<script>
/* Entrance motion only once the renderer is actually painting frames;
   content stays fully visible if animations never run. */
requestAnimationFrame(()=>requestAnimationFrame(()=>document.documentElement.classList.add("motion")));

/* ============================================================
   CONFIG: sections & questions
   id = Airtable field name (must match the table exactly)
   ============================================================ */
const SECTIONS = [
{
  roman:"I", title:"Basic info", tag:"Identity",
  intro:"This is what chatters say when fans ask. Answer as your persona if you'd rather keep real details private.",
  q:[
    {id:"Stage Name", label:"Stage name", hint:"The name chatters use for you.", req:true},
    {id:"Age / DOB", label:"Age fans should be told", hint:"Add your DOB if you're comfortable. It keeps answers consistent.", req:true},
    {id:"Height", label:"Height"},
    {id:"Ethnicity", label:"Listed ethnicity / background"},
    {id:"Timezone", label:"Your timezone", req:true, ph:"e.g. AEST, AWST, CET"},
    {id:"Listed Location", label:"Location fans should be told", hint:"City / country.", req:true},
    {id:"Languages", label:"Languages you speak", hint:"Only what fans know about."},
    {id:"Relationship Status", label:"Relationship status (as far as fans know)", type:"chips", opts:["Single","Taken","Complicated","Never discussed"]},
    {id:"Sexuality", label:"Sexuality to present as", type:"chips", opts:["Straight","Bi","Bi curious","Lesbian","Fluid"]},
    {id:"Bust Size", label:"Bust / bra size"}
  ]
},
{
  roman:"II", title:"Persona & chatting style", tag:"Voice",
  intro:"How your chat team should sound and what they should lean into.",
  q:[
    {id:"Persona Vibe", label:"Your current persona / vibe in a few words", type:"area"},
    {id:"Chat Tone", label:"Tone chatters should use", type:"chips-multi", opts:["GFE","Dominant","Submissive","Bratty","Mommy","Cutesy","Neutral","No preference (up to our expertise)"]},
    {id:"Popular Kinks", label:"Kinks, themes or dynamics popular with your fans right now", type:"area", hint:"Only if there's something specific."},
    {id:"Older Personas", label:"Older personas fans might reference", type:"area"},
    {id:"Fav Position", label:"Favourite sex position (for chatting purposes)"},
    {id:"Toys", label:"Sex toys you own that chatters can mention", type:"area"},
    {id:"Outfits", label:"Costumes, lingerie or outfits fans could ask about", type:"area"}
  ]
},
{
  roman:"III", title:"Customs", tag:"Pricing",
  intro:"Rules, pricing and approvals for custom content requests.",
  q:[
    {id:"Does Customs", label:"Do you do custom content?", type:"chips", opts:["Yes","No","Approval required"]},
    {id:"Customs Cast", label:"Who's in your customs?", type:"chips-multi", opts:["Solo only","G/G","B/G","Other"]},
    {id:"Customs Pricing", label:"Minimum price per minute & minimum total spend", type:"area", ph:"e.g. $30/min, $150 minimum"},
    {id:"Premium Acts", label:"Acts that are premium priced", type:"area", hint:"e.g. squirt, anal, specific toys."},
    {id:"Customs Hard Limits", label:"Hard limits: things you will never film", type:"area"},
    {id:"Customs Restrictions", label:"Other restrictions", type:"area", hint:"e.g. no names, no extreme content, delivery time."},
    {id:"Customs Approval", label:"Custom requests: who approves them?", type:"chips", opts:["I approve every request first","Chatters decide within my guidelines","Check with me only for unusual requests"]},
    {id:"Urgent Contact", label:"Best way to reach you for urgent approvals", ph:"e.g. WhatsApp +61 ..."},
    {id:"VIP Fans", label:"High spending or long term fans chatters should treat differently", type:"area"}
  ]
},
{
  roman:"IV", title:"Merch & physical items", tag:"Physical",
  q:[
    {id:"Sells Physical Items", label:"Do you sell worn items, merch or physical goods?", hint:"If you don't sell yet, our team can set this up and sell on your behalf.", type:"chips", opts:["Yes","No","Not yet, but you can sell for me"]},
    {id:"Physical Min Price", label:"Minimum price per item"},
    {id:"Physical Restrictions", label:"Platforms where physical item sales are restricted or banned for you", type:"area"}
  ]
},
{
  roman:"V", title:"Content & vault", tag:"Library",
  q:[
    {id:"Speaks In Videos", label:"Do you speak in your videos?", type:"chips", opts:["Yes","No","Sometimes"]},
    {id:"Tattoos", label:"Tattoos, and are they visible in content?", type:"area"},
    {id:"Social Media Links", label:"Provide all direct links to the social media platforms you are active on", hint:"Instagram, TikTok, X, YouTube. One link per line.", type:"area", tall:true},
    {id:"Active Platforms", label:"Provide all direct links to the adult platforms you are active on", hint:"OF, Fansly, OFTV and anywhere else you post adult content. One link per line.", type:"area", tall:true},
    {id:"Old Social Accounts", label:"Banned accounts fans might still bring up", type:"area", hint:"Banned or deleted accounts: Twitch, Instagram, etc."}
  ]
},
{
  roman:"VI", title:"Personal info", tag:"Persona",
  intro:"Backstory details so chatters never contradict you. Persona answers are fine.",
  q:[
    {id:"Pets", label:"Pets", hint:"Name + breed."},
    {id:"Children", label:"Children (as far as fans know)", type:"chips", opts:["Yes","No"]},
    {id:"Children Details", label:"Anything you're comfortable sharing about them", type:"area", hint:"Only what chatters should know, like how many, rough ages, or just that they exist. Skip anything private.", showIf:{id:"Children", equals:"Yes"}},
    {id:"Hobbies", label:"Hobbies & how you spend free time", type:"area"},
    {id:"Dislikes / Avoid Topics", label:"Things you're not into, scared of, or dislike", type:"area", hint:"Chatters will avoid these topics."},
    {id:"Fav Food", label:"Favourite food"},
    {id:"Fav Colour", label:"Favourite colour"},
    {id:"Fav Music", label:"Favourite music / artists"},
    {id:"Fav Shows", label:"Favourite TV shows or movies"},
    {id:"Backstory", label:"Previous jobs or education chatters can reference", type:"area"},
    {id:"Fun Facts", label:"Fun facts fans would find interesting", type:"area"}
  ]
},
{
  roman:"VII", title:"Hard limits & compliance", tag:"Protection",
  q:[
    {id:"Shutdown Topics", label:"Topics chatters must shut down immediately", type:"area", hint:"e.g. incest themes, specific kink categories."},
    {id:"DNE Fans", label:"Fans tagged DNE (do not engage) or flagged for special handling", type:"area"},
    {id:"Compliance Notes", label:"Platform compliance issues chatters need to know", type:"area"},
    {id:"Past Team Issues", label:"Previous agency or chat team behaviour you want corrected (we will correct the obvious anyways)", type:"area"}
  ]
},
{
  roman:"VIII", title:"A few extras", tag:"Optional",
  intro:"All optional. If you'd rather answer these in a WhatsApp voice message, skip ahead and send them there.",
  q:[
    {id:"Extra Personality Notes", label:"Anything else about you / your personality we haven't asked", type:"area"},
    {id:"Video Calls", label:"Do you accept video calls with fans?", type:"chips", opts:["Yes","No","Open to it"]},
    {id:"Call $ Guide", label:"Price in mind for video calls"},
    {id:"Livestreaming", label:"Currently livestreaming regularly?", hint:"OF or any other platform."},
    {id:"Uncomfortable Content", label:"Content you're not comfortable with", type:"area"},
    {id:"Custom $ Guide", label:"Specific $ amounts in mind for customs"},
    {id:"VIP Systems Before", label:"Have you done VIP systems before?", type:"chips", opts:["Yes","No"]},
    {id:"Private Shows", label:"Private live shows and one on one calls: open to them? Minimum price? Or okay if we use them as a hook?", type:"area"},
    {id:"Fanbase Notes", label:"Anything else about your fanbase / account we should know", type:"area"}
  ]
}
];

/* ============================================================ */
const LS_KEY = "halevora_mikaela_onboarding_v1";
const app = document.getElementById("app");
const bar = document.getElementById("bar");
const stepLabel = document.getElementById("stepLabel");
const TOTAL = SECTIONS.length;

let state = { step: -1, data: {}, done:false };
try {
  const saved = JSON.parse(localStorage.getItem(LS_KEY));
  if (saved && typeof saved === "object") state = Object.assign(state, saved);
} catch(e){}
if (state.step >= TOTAL) state.step = TOTAL - 1;

function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function render(){
  window.scrollTo({top:0, behavior:"instant" in window ? "instant" : "auto"});
  if (state.done) return renderDone();
  if (state.step < 0) return renderWelcome();
  renderSection(state.step);
}

/* ---------- welcome ---------- */
function renderWelcome(){
  stepLabel.textContent = "For Mikaela";
  bar.style.transform = "scaleX(0)";
  const toc = SECTIONS.map(s=>`<div class="toc-row"><span class="r">${s.roman}</span><span>${esc(s.title)}</span></div>`).join("");
  app.innerHTML = `
  <div class="screen active welcome">
    <div class="portrait-wrap" id="portraitWrap">
      <img src="mikaela.jpg" alt="Mikaela" onerror="document.getElementById('portraitWrap').classList.add('missing')">
      <div class="portrait-fallback"><span>M</span></div>
    </div>
    <div class="dedication">Made just for you.</div>
    <h1>Welcome, <em>Mikaela.</em></h1>
    <p class="lede">This questionnaire builds your private info sheet. Your chat team will use it to answer fans exactly the way you would. It takes about 15 minutes, and your answers save on this device as you go, so you can stop and come back anytime.</p>
    <div class="nav"><button class="btn btn-main" onclick="go(0)">Begin</button></div>
    <div class="confidential"><b>Between us</b>Only Halevora's core team reads your answers. Answer as your persona wherever you'd rather keep real details private. Starred fields are required, everything else you can skip.</div>
    <div class="toc">${toc}</div>
  </div>`;
}

/* ---------- section ---------- */
function renderSection(i){
  const s = SECTIONS[i];
  stepLabel.textContent = `Part ${s.roman} · ${i+1} of ${TOTAL}`;
  bar.style.transform = `scaleX(${i/TOTAL})`;
  const fields = s.q.map(q=>{
    const v = state.data[q.id] ?? "";
    let control = "";
    if (q.type === "chips" || q.type === "chips-multi"){
      const selected = q.type==="chips-multi" ? String(v).split(", ").filter(Boolean) : [String(v)];
      control = `<div class="chips" data-id="${esc(q.id)}" data-multi="${q.type==="chips-multi"?1:0}">` +
        q.opts.map(o=>`<button type="button" class="chip ${selected.includes(o)?"on":""}" data-val="${esc(o)}">${esc(o)}</button>`).join("") +
        `</div>`;
    } else if (q.type === "area"){
      control = `<textarea data-id="${esc(q.id)}"${q.tall?' class="tall"':""} placeholder="${esc(q.ph||"")}">${esc(v)}</textarea>`;
    } else {
      control = `<input type="text" data-id="${esc(q.id)}" value="${esc(v)}" placeholder="${esc(q.ph||"")}">`;
    }
    const showIfAttr = q.showIf ? ` data-showif-id="${esc(q.showIf.id)}" data-showif-val="${esc(q.showIf.equals)}"` : "";
    const hiddenInit = q.showIf && String(state.data[q.showIf.id] ?? "") !== q.showIf.equals ? " is-hidden" : "";
    return `<div class="field${hiddenInit}" data-field="${esc(q.id)}"${showIfAttr}>
      <label class="q">${esc(q.label)}${q.req?'<span class="req">*</span>':""}</label>
      ${q.hint?`<div class="hint">${esc(q.hint)}</div>`:""}
      ${control}
      <div class="err">This one's required.</div>
    </div>`;
  }).join("");

  const last = i === TOTAL-1;
  app.innerHTML = `
  <div class="screen active">
    <div class="eyebrow"><span class="roman">Part ${s.roman}</span><span class="rule"></span><span class="tag">${esc(s.tag)}</span></div>
    <h2>${esc(s.title)}</h2>
    ${s.intro?`<p class="section-intro">${esc(s.intro)}</p>`:`<div style="height:18px"></div>`}
    ${fields}
    <div class="nav">
      <button class="btn btn-ghost" onclick="go(${i-1})">Back</button>
      <button class="btn btn-main" id="nextBtn" onclick="${last?"submit()":"next("+i+")"}">${last?"Submit my info sheet":"Continue"}</button>
    </div>
    ${!last?'<p class="skip-note">Skip anything that doesn’t apply. You can send extras on WhatsApp later.</p>':""}
  </div>`;

  // wire inputs
  app.querySelectorAll("input[data-id],textarea[data-id]").forEach(el=>{
    el.addEventListener("input", ()=>{ state.data[el.dataset.id] = el.value; save(); el.closest(".field").classList.remove("invalid"); });
  });
  app.querySelectorAll(".chips").forEach(group=>{
    const multi = group.dataset.multi === "1";
    group.querySelectorAll(".chip").forEach(chip=>{
      chip.addEventListener("click", ()=>{
        if (multi){
          chip.classList.toggle("on");
          const vals = [...group.querySelectorAll(".chip.on")].map(c=>c.dataset.val);
          state.data[group.dataset.id] = vals.join(", ");
        } else {
          const was = chip.classList.contains("on");
          group.querySelectorAll(".chip").forEach(c=>c.classList.remove("on"));
          if (!was){ chip.classList.add("on"); state.data[group.dataset.id] = chip.dataset.val; }
          else { state.data[group.dataset.id] = ""; }
        }
        save();
        applyReveals();
      });
    });
  });
  applyReveals();
}

/* Show/hide follow-up fields whose showIf condition is (not) met.
   When a follow-up is hidden its stored answer is cleared, so a changed
   parent answer never submits stale detail. */
function applyReveals(){
  app.querySelectorAll(".field[data-showif-id]").forEach(f=>{
    const cid = f.getAttribute("data-showif-id");
    const cval = f.getAttribute("data-showif-val");
    const show = String(state.data[cid] ?? "") === cval;
    f.classList.toggle("is-hidden", !show);
    if (!show){
      const fid = f.getAttribute("data-field");
      if (state.data[fid]){
        state.data[fid] = "";
        const ctrl = f.querySelector("[data-id]");
        if (ctrl) ctrl.value = "";
        save();
      }
    }
  });
}

function validate(i){
  let ok = true;
  SECTIONS[i].q.forEach(q=>{
    if (q.req && !String(state.data[q.id]||"").trim()){
      ok = false;
      const f = app.querySelector(`.field[data-field="${CSS.escape(q.id)}"]`);
      if (f){ f.classList.add("invalid"); }
    }
  });
  if (!ok){
    const firstBad = app.querySelector(".field.invalid");
    if (firstBad) firstBad.scrollIntoView({behavior:"smooth", block:"center"});
  }
  return ok;
}

function next(i){ if(!validate(i)) return; go(i+1); }
function go(i){ state.step = i; save(); render(); }

/* ---------- submit ---------- */
async function submit(){
  if(!validate(TOTAL-1)) return;
  const btn = document.getElementById("nextBtn");
  btn.disabled = true; btn.textContent = "Sending…";
  const fields = {};
  for (const [k,v] of Object.entries(state.data)){
    if (String(v).trim() !== "") fields[k] = String(v).trim();
  }
  fields["Submitted At"] = new Date().toISOString();
  try{
    const r = await fetch("/submit", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ fields })
    });
    if (!r.ok) throw new Error("HTTP "+r.status);
    state.done = true; save(); render();
  }catch(e){
    btn.disabled = false; btn.textContent = "Submit my info sheet";
    alert("Couldn't send right now. Your answers are saved on this device. Check your connection and tap Submit again.");
  }
}

/* ---------- done ---------- */
function renderDone(){
  stepLabel.textContent = "Complete";
  bar.style.transform = "scaleX(1)";
  app.innerHTML = `
  <div class="done-wrap">
    <div class="done-crest">✦</div>
    <h1>Thank you, <em>Mikaela.</em></h1>
    <p class="lede" style="margin:0 auto 10px">Your info sheet is with us. The team will turn it into your chatter brief. If your pricing, limits or persona change, message us on WhatsApp and we will update it the same day.</p>
    <p class="lede" style="margin:18px auto 0;font-size:13.5px;opacity:.85">You can send anything you skipped as a WhatsApp voice message. Talk soon. xx</p>
  </div>`;
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
}

render();
</script>
</body>
</html>
